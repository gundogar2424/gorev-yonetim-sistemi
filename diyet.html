<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Diyet Koçu</title>
    <script>
      // Eski servis-iscilerini ve onbellekleri temizle (PWA kaldirildi).
      (function () {
        if (!('serviceWorker' in navigator)) return
        navigator.serviceWorker
          .getRegistrations()
          .then(function (regs) {
            var had = regs.length > 0
            regs.forEach(function (r) {
              r.unregister()
            })
            if (window.caches && caches.keys) {
              caches.keys().then(function (keys) {
                keys.forEach(function (k) {
                  caches.delete(k)
                })
              })
            }
            if (had && !sessionStorage.getItem('sw-temizlendi')) {
              sessionStorage.setItem('sw-temizlendi', '1')
              location.reload()
            }
          })
          .catch(function () {})
      })()
    </script>
  </head>
  <body style="margin:0;font-family:system-ui,sans-serif">
    <div id="root">
      <div style="padding:24px;text-align:center;color:#475569">Diyet Koçu yükleniyor…</div>
    </div>
    <noscript>
      <div style="padding:24px;text-align:center">
        Bu uygulama için tarayıcınızda JavaScript açık olmalıdır.
      </div>
    </noscript>
    <script type="module" src="/src/diet/main.tsx"></script>
  </body>
</html>
