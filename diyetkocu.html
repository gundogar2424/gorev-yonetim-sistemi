<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Diyet Koçu</title>
    <script>
      // Eski servis-iscilerini ve onbellekleri temizle (PWA kaldirildi).
      // Boylece cihazda kalmis bozuk kopyalar silinir, sayfa internetten taze yuklenir.
      (function () {
        if (!('serviceWorker' in navigator)) return
        navigator.serviceWorker
          .getRegistrations()
          .then(function (regs) {
            var had = regs.length > 0
            regs.forEach(function (r) {
              r.unregister()
            })
            if (window.caches && caches.keys) {
              caches.keys().then(function (keys) {
                keys.forEach(function (k) {
                  caches.delete(k)
                })
              })
            }
            if (had && !sessionStorage.getItem('sw-temizlendi')) {
              sessionStorage.setItem('sw-temizlendi', '1')
              location.reload()
            }
          })
          .catch(function () {})
      })()
    </script>
    <script>
      // Tani amacli: her turlu hatayi ekranda kirmizi serit olarak goster
      (function () {
        function showErr(msg) {
          try {
            var d = document.createElement('div')
            d.style.cssText =
              'position:fixed;left:0;right:0;bottom:0;max-height:55%;overflow:auto;background:#b91c1c;color:#fff;padding:12px;font:12px/1.4 system-ui,sans-serif;z-index:99999;white-space:pre-wrap'
            d.textContent = 'HATA: ' + msg
            ;(document.body || document.documentElement).appendChild(d)
          } catch (_) {}
        }
        window.addEventListener('error', function (e) {
          showErr((e.message || 'bilinmiyor') + '  @ ' + (e.filename || '') + ':' + (e.lineno || ''))
        })
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason
          showErr('promise: ' + (r && (r.stack || r.message) ? r.stack || r.message : String(r)))
        })
      })()
    </script>
  </head>
  <body style="margin:0;font-family:system-ui,sans-serif">
    <div id="root">
      <div style="padding:24px;text-align:center;color:#475569">Diyet Koçu yükleniyor…</div>
    </div>
    <noscript>
      <div style="padding:24px;text-align:center">
        Bu uygulama için tarayıcınızda JavaScript açık olmalıdır.
      </div>
    </noscript>
    <script type="module" src="/src/diet/main.tsx"></script>
  </body>
</html>
