# Derleme yeniden tetikleme (Maven 403 geçici hatasından sonra)
name: APK Derle (Diyet Koçu)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'src/diet/**'
      - 'diyetkocu.html'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bağımlılıklar
        run: npm ci

      - name: Web derlemesi
        run: npm run build
        env:
          APP_BUILD: ${{ github.run_number }}

      - name: Diyet uygulamasını APK girişi yap
        run: cp dist/diyetkocu.html dist/index.html

      - name: Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Android projesini oluştur (Capacitor)
        run: npx cap add android

      - name: Web varlıklarını senkronla
        run: npx cap sync android

      - name: Kamera izni ekle (canlı barkod tarayıcı için)
        run: |
          f=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.CAMERA' "$f" || sed -i 's#</manifest>#    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n</manifest>#' "$f"
          grep -q 'READ_MEDIA_IMAGES' "$f" || sed -i 's#</manifest>#    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n</manifest>#' "$f"
          grep -q 'mlkit.vision.DEPENDENCIES' "$f" || sed -i 's#</application>#    <meta-data android:name="com.google.mlkit.vision.DEPENDENCIES" android:value="barcode_ui" />\n</application>#' "$f"
          echo "--- manifest ---"; grep -E "uses-permission|uses-feature|mlkit" "$f" || true

      - name: Sürüm kodunu artır (her güncelleme üstüne kurulabilsin)
        run: |
          cd android/app
          sed -i -E "s/versionCode [0-9]+/versionCode ${{ github.run_number }}/" build.gradle
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"1.0.${{ github.run_number }}\"/" build.gradle
          echo "versionCode -> ${{ github.run_number }}"
          grep -E "versionCode|versionName" build.gradle

      - name: Sabit debug imza anahtarı (güncellemeler üstüne kurulabilsin)
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore

      - name: APK derle (debug, sabit imza)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon -I ../signing.gradle

      - name: APK'yı yeniden adlandır
        run: cp android/app/build/outputs/apk/debug/app-debug.apk diyet-kocu.apk

      - name: APK'yı artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: diyet-kocu-apk
          path: diyet-kocu.apk

      - name: Sürüm olarak yayınla (indirilebilir bağlantı)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Diyet Koçu APK
          body: |
            En güncel Diyet Koçu Android uygulaması.
            İndir, telefonda aç, "bilinmeyen kaynaklara izin ver" diyip kur.
          files: diyet-kocu.apk
          make_latest: true
