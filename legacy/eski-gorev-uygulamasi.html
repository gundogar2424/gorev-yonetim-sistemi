<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görev Yönetim Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B4513, #A0522D);
            color: #333;
            line-height: 1.6;
            padding: 10px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 20px;
            min-height: 500px;
        }

        .header {
            text-align: center;
            color: #8B4513;
            margin-bottom: 30px;
            border-bottom: 3px solid #8B4513;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #8B4513;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, input, button {
            width: 100%;
            padding: 12px;
            border: 2px solid #D2B48C;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }

        button {
            background: linear-gradient(135deg, #8B4513, #A0522D);
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.4);
        }

        .task-list {
            margin-top: 20px;
        }

        .task-item {
            background: #f8f8f8;
            border-left: 4px solid #8B4513;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .task-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #8B4513;
        }

        .task-status {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-waiting { background: #FFE4B5; color: #8B4513; }
        .status-progress { background: #E0E6FF; color: #4169E1; }
        .status-completed { background: #E8F5E8; color: #228B22; }

        .hidden { display: none; }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background: #4CAF50;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .admin-panel {
            border-top: 2px solid #8B4513;
            margin-top: 20px;
            padding-top: 20px;
        }

        .user-list {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }

        .firebase-status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-weight: bold;
        }

        .firebase-connected {
            background: #E8F5E8;
            color: #228B22;
        }

        .firebase-disconnected {
            background: #FFE4E1;
            color: #DC143C;
        }

        @media (max-width: 480px) {
            .container {
                max-width: 95%;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Görev Yönetim Sistemi</h1>
            <div id="firebaseStatus" class="firebase-status firebase-disconnected">
                🔄 Sistem Bağlantısı Kuruluyor...
            </div>
        </div>

        <!-- Login Screen -->
        <div id="loginScreen">
            <div class="form-group">
                <label for="userSelect">👤 Kullanıcı Seçin:</label>
                <select id="userSelect">
                    <option value="">Seçiniz...</option>
                    <option value="YONETICI">👨‍💼 YÖNETİCİ</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">🔐 Şifre:</label>
                <input type="password" id="password" placeholder="4 haneli şifrenizi girin" maxlength="4">
            </div>

            <button onclick="login()">🚀 Giriş Yap</button>
            <button onclick="createPassword()" style="margin-top: 10px; background: #4CAF50;">🔧 Şifre Oluştur</button>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" class="hidden">
            <div class="admin-panel">
                <h3>👨‍💼 Yönetici Paneli</h3>

                <button onclick="showAddUser()">👤 Yeni Kullanıcı Ekle</button>
                <button onclick="showAddTask()" style="margin-top: 10px;">📝 Görev Ata</button>
                <button onclick="showUserList()" style="margin-top: 10px;">📋 Kullanıcı Listesi</button>
                <button onclick="logout()" style="margin-top: 10px; background: #f44336;">🚪 Çıkış</button>

                <!-- Add User Form -->
                <div id="addUserForm" class="hidden" style="margin-top: 20px;">
                    <h4>Yeni Kullanıcı Ekle</h4>
                    <div class="form-group">
                        <label>👤 İsim:</label>
                        <input type="text" id="newUserName" placeholder="Kullanıcı adı">
                    </div>
                    <button onclick="addUser()">✅ Kullanıcı Ekle</button>
                    <button onclick="hideAddUser()" style="background: #f44336;">❌ İptal</button>
                </div>

                <!-- Add Task Form -->
                <div id="addTaskForm" class="hidden" style="margin-top: 20px;">
                    <h4>Görev Ata</h4>
                    <div class="form-group">
                        <label>👤 Kime:</label>
                        <select id="taskUser">
                            <option value="">Seçiniz...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📝 Görev:</label>
                        <input type="text" id="taskTitle" placeholder="Görev başlığı">
                    </div>
                    <div class="form-group">
                        <label>📄 Açıklama:</label>
                        <textarea id="taskDesc" rows="3" placeholder="Görev detayları" style="resize: vertical;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>📅 Bitiş Tarihi:</label>
                        <input type="date" id="taskDate">
                    </div>
                    <button onclick="addTask()">✅ Görev Ata</button>
                    <button onclick="hideAddTask()" style="background: #f44336;">❌ İptal</button>
                </div>

                <!-- User List -->
                <div id="userListDiv" class="hidden user-list" style="margin-top: 20px;">
                    <h4>👥 Kullanıcı Listesi</h4>
                    <div id="userListContent"></div>
                    <button onclick="hideUserList()" style="background: #f44336; margin-top: 10px;">❌ Kapat</button>
                </div>
            </div>
        </div>

        <!-- Worker Panel -->
        <div id="workerPanel" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 id="workerWelcome">👋 Hoşgeldiniz</h3>
                <button onclick="logout()" style="background: #f44336; width: auto; padding: 8px 15px;">🚪 Çıkış</button>
            </div>

            <div class="task-list">
                <h4>📋 Görevleriniz</h4>
                <div id="taskListContent"></div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        // Firebase configuration - Public config, safe to expose
        const firebaseConfig = {
            apiKey: "AIzaSyBxxxxxxxxxxxxxxxxxxxxxxxxxxx",
            authDomain: "gorev-sistemi.firebaseapp.com",
            databaseURL: "https://gorev-sistemi-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "gorev-sistemi",
            storageBucket: "gorev-sistemi.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:xxxxxxxxxxxxxxxx"
        };

        // For demo purposes, use localStorage with sync simulation
        let database = null;
        let isFirebaseConnected = false;

        // Initialize "database" (localStorage for demo)
        function initDatabase() {
            try {
                // Simulate Firebase connection
                setTimeout(() => {
                    isFirebaseConnected = true;
                    updateFirebaseStatus();
                    loadUsers();
                }, 1000);

                // Initialize default data if empty
                if (!localStorage.getItem('gorev_users')) {
                    localStorage.setItem('gorev_users', JSON.stringify({}));
                }
                if (!localStorage.getItem('gorev_tasks')) {
                    localStorage.setItem('gorev_tasks', JSON.stringify([]));
                }
                if (!localStorage.getItem('gorev_passwords')) {
                    localStorage.setItem('gorev_passwords', JSON.stringify({}));
                }
            } catch (error) {
                console.error('Database init error:', error);
                updateFirebaseStatus();
            }
        }

        function updateFirebaseStatus() {
            const statusDiv = document.getElementById('firebaseStatus');
            if (isFirebaseConnected) {
                statusDiv.className = 'firebase-status firebase-connected';
                statusDiv.innerHTML = '✅ Sistem Bağlantısı Aktif';
            } else {
                statusDiv.className = 'firebase-status firebase-disconnected';
                statusDiv.innerHTML = '❌ Çevrimdışı Mod (Demo)';
            }
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification show ${type}`;

            // Play sound
            try {
                const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmEcBje/uvy8dy/1nV+jyz+gTQgPWK3v6pZQEBNUruXnrVkWDlKo5+iwVR8FtmP4gE9kcvb/uqXoJHvU6tGVWRwKWK7x5ZlPExJYquHorrVWEAdWqunorFQVDVOl5O6zViALOIzT7tOZVhoMV6fp66hQExJUre/kr1cUGFGk6uyyVhwGJJLU7tiTUhoRVKvl6adRFhJTpOftr1MUDVGl6uyzVBYMUp/n7rFUFhJVpOjurFRFG1Ol5O6wVRkOV6bn6q5WFQ9Vpe7krVUZG1Gl6O6wVBYMV6bn7a9VFQ9VpOnn");
                audio.play().catch(() => {});
            } catch (error) {}

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function generatePassword() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        function createPassword() {
            const userSelect = document.getElementById('userSelect');
            const passwordInput = document.getElementById('password');

            if (!userSelect.value) {
                showNotification('Önce kullanıcı seçin!', 'error');
                return;
            }

            const password = generatePassword();
            passwordInput.value = password;

            // Save password
            const passwords = JSON.parse(localStorage.getItem('gorev_passwords') || '{}');
            passwords[userSelect.value] = password;
            localStorage.setItem('gorev_passwords', JSON.stringify(passwords));

            showNotification(`Şifreniz oluşturuldu: ${password}`);
        }

        function login() {
            const userSelect = document.getElementById('userSelect');
            const password = document.getElementById('password');

            if (!userSelect.value || !password.value) {
                showNotification('Kullanıcı ve şifre gerekli!', 'error');
                return;
            }

            const passwords = JSON.parse(localStorage.getItem('gorev_passwords') || '{}');

            if (passwords[userSelect.value] !== password.value) {
                showNotification('Hatalı şifre!', 'error');
                return;
            }

            // Login successful
            document.getElementById('loginScreen').classList.add('hidden');

            if (userSelect.value === 'YONETICI') {
                document.getElementById('adminPanel').classList.remove('hidden');
                loadUsersForTaskAssignment();
            } else {
                document.getElementById('workerPanel').classList.remove('hidden');
                document.getElementById('workerWelcome').textContent = `👋 Hoşgeldiniz ${userSelect.value}`;
                loadWorkerTasks(userSelect.value);
            }

            showNotification('Giriş başarılı!');
        }

        function logout() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('workerPanel').classList.add('hidden');

            // Reset forms
            document.getElementById('userSelect').value = '';
            document.getElementById('password').value = '';

            showNotification('Çıkış yapıldı!');
        }

        function loadUsers() {
            const userSelect = document.getElementById('userSelect');
            const users = JSON.parse(localStorage.getItem('gorev_users') || '{}');

            // Clear existing options except admin
            userSelect.innerHTML = '<option value="">Seçiniz...</option><option value="YONETICI">👨‍💼 YÖNETİCİ</option>';

            // Add users
            for (const userName in users) {
                const option = document.createElement('option');
                option.value = userName;
                option.textContent = `👤 ${userName}`;
                userSelect.appendChild(option);
            }
        }

        function showAddUser() {
            document.getElementById('addUserForm').classList.remove('hidden');
        }

        function hideAddUser() {
            document.getElementById('addUserForm').classList.add('hidden');
            document.getElementById('newUserName').value = '';
        }

        function addUser() {
            const userName = document.getElementById('newUserName').value.trim();

            if (!userName) {
                showNotification('Kullanıcı adı gerekli!', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('gorev_users') || '{}');
            const passwords = JSON.parse(localStorage.getItem('gorev_passwords') || '{}');

            if (users[userName]) {
                showNotification('Bu kullanıcı zaten var!', 'error');
                return;
            }

            // Add user and generate password
            users[userName] = { name: userName, createdAt: new Date().toISOString() };
            passwords[userName] = generatePassword();

            localStorage.setItem('gorev_users', JSON.stringify(users));
            localStorage.setItem('gorev_passwords', JSON.stringify(passwords));

            loadUsers();
            loadUsersForTaskAssignment();
            hideAddUser();

            showNotification(`${userName} eklendi! Şifre: ${passwords[userName]}`);
        }

        function showUserList() {
            const users = JSON.parse(localStorage.getItem('gorev_users') || '{}');
            const passwords = JSON.parse(localStorage.getItem('gorev_passwords') || '{}');

            let html = '';
            for (const userName in users) {
                html += `
                    <div class="user-item">
                        <span>👤 ${userName}</span>
                        <span>🔐 ${passwords[userName] || 'Şifre yok'}</span>
                    </div>
                `;
            }

            if (html === '') {
                html = '<p>Henüz kullanıcı eklenmemiş.</p>';
            }

            document.getElementById('userListContent').innerHTML = html;
            document.getElementById('userListDiv').classList.remove('hidden');
        }

        function hideUserList() {
            document.getElementById('userListDiv').classList.add('hidden');
        }

        function loadUsersForTaskAssignment() {
            const taskUserSelect = document.getElementById('taskUser');
            const users = JSON.parse(localStorage.getItem('gorev_users') || '{}');

            taskUserSelect.innerHTML = '<option value="">Seçiniz...</option>';

            for (const userName in users) {
                const option = document.createElement('option');
                option.value = userName;
                option.textContent = userName;
                taskUserSelect.appendChild(option);
            }
        }

        function showAddTask() {
            document.getElementById('addTaskForm').classList.remove('hidden');
            loadUsersForTaskAssignment();
        }

        function hideAddTask() {
            document.getElementById('addTaskForm').classList.add('hidden');
            // Clear form
            document.getElementById('taskUser').value = '';
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('taskDate').value = '';
        }

        function addTask() {
            const user = document.getElementById('taskUser').value;
            const title = document.getElementById('taskTitle').value.trim();
            const desc = document.getElementById('taskDesc').value.trim();
            const date = document.getElementById('taskDate').value;

            if (!user || !title) {
                showNotification('Kullanıcı ve görev başlığı gerekli!', 'error');
                return;
            }

            const tasks = JSON.parse(localStorage.getItem('gorev_tasks') || '[]');

            const newTask = {
                id: Date.now(),
                user: user,
                title: title,
                description: desc,
                dueDate: date,
                status: 'waiting',
                createdAt: new Date().toISOString(),
                notes: []
            };

            tasks.push(newTask);
            localStorage.setItem('gorev_tasks', JSON.stringify(tasks));

            hideAddTask();
            showNotification(`${user} için görev oluşturuldu!`);
        }

        function loadWorkerTasks(userName) {
            const tasks = JSON.parse(localStorage.getItem('gorev_tasks') || '[]');
            const userTasks = tasks.filter(task => task.user === userName);

            let html = '';
            if (userTasks.length === 0) {
                html = '<p style="text-align: center; color: #666;">Henüz göreviniz bulunmuyor.</p>';
            } else {
                userTasks.forEach(task => {
                    const statusClass = `status-${task.status}`;
                    const statusText = {
                        'waiting': 'Bekliyor',
                        'progress': 'Devam Ediyor',
                        'completed': 'Tamamlandı'
                    }[task.status];

                    html += `
                        <div class="task-item">
                            <div class="task-header">
                                <span>${task.title}</span>
                                <span class="task-status ${statusClass}">${statusText}</span>
                            </div>
                            <p style="margin: 10px 0; color: #666;">${task.description}</p>
                            ${task.dueDate ? `<p style="font-size: 12px; color: #8B4513;">📅 ${task.dueDate}</p>` : ''}
                            <div style="margin-top: 10px;">
                                <button onclick="updateTaskStatus(${task.id})" style="width: auto; padding: 5px 10px; margin-right: 5px;">
                                    Durum Değiştir
                                </button>
                                <button onclick="addTaskNote(${task.id})" style="width: auto; padding: 5px 10px; background: #4CAF50;">
                                    Not Ekle
                                </button>
                            </div>
                            <div id="notes-${task.id}" style="margin-top: 10px;">
                                ${task.notes.map(note => `
                                    <div style="background: #f0f0f0; padding: 8px; margin: 5px 0; border-radius: 5px; font-size: 12px;">
                                        <strong>${note.author}:</strong> ${note.text}
                                        <br><small>${new Date(note.timestamp).toLocaleString('tr-TR')}</small>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('taskListContent').innerHTML = html;
        }

        function updateTaskStatus(taskId) {
            const tasks = JSON.parse(localStorage.getItem('gorev_tasks') || '[]');
            const taskIndex = tasks.findIndex(t => t.id === taskId);

            if (taskIndex === -1) return;

            const task = tasks[taskIndex];
            const statusOptions = ['waiting', 'progress', 'completed'];
            const currentIndex = statusOptions.indexOf(task.status);
            const nextIndex = (currentIndex + 1) % statusOptions.length;

            task.status = statusOptions[nextIndex];

            localStorage.setItem('gorev_tasks', JSON.stringify(tasks));

            // Reload tasks
            const currentUser = document.getElementById('workerWelcome').textContent.replace('👋 Hoşgeldiniz ', '');
            loadWorkerTasks(currentUser);

            showNotification('Görev durumu güncellendi!');
        }

        function addTaskNote(taskId) {
            const noteText = prompt('Not ekleyin:');
            if (!noteText) return;

            const tasks = JSON.parse(localStorage.getItem('gorev_tasks') || '[]');
            const taskIndex = tasks.findIndex(t => t.id === taskId);

            if (taskIndex === -1) return;

            const currentUser = document.getElementById('workerWelcome').textContent.replace('👋 Hoşgeldiniz ', '');

            tasks[taskIndex].notes.push({
                text: noteText,
                author: currentUser,
                timestamp: new Date().toISOString()
            });

            localStorage.setItem('gorev_tasks', JSON.stringify(tasks));

            // Reload tasks
            loadWorkerTasks(currentUser);

            showNotification('Not eklendi!');
        }

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            initDatabase();

            // Set default date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('taskDate').value = today;
        });
    </script>
</body>
</html>
